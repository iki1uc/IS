export function GHOST_SCAN_REAL(r){
  return {
    NAME: r.NAME || "UNKNOWN",
    ID: r.ID || "NONE",
    STATUS: r.STATUS || "MISS",
    RESULT: r.RESULT || "VOID",
    OUT: r.OUT || {},
    RAUM: r.RAUM || null,
    WAHRHEIT: r.WAHRHEIT || "?",
    IST_IST: r.IST_IST || "?",
    stamp: Date.now()
  };
}
